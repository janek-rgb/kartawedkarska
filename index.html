  { q: "Co powinien zrobić wędkarz widząc zanieczyszczenie wody lub śnięte ryby?", o: ["Zmienić łowisko", "Zawiadomić koło/okręg PZW, Policję, Straż Miejską lub organ administracji", "Wyłowić śnięte ryby"], k: 1, cat: "Etyka", e: "Obowiązkiem jest zawiadomienie zarządu koła lub okręgu PZW, Policji, Straży Miejskiej albo organu administracji państwowej lub samorządowej." },
  { q: "Połów ryb kuszą dozwolony jest:", o: ["Całą dobę", "Wyłącznie w porze dziennej: od godziny po wschodzie do godziny przed zachodem słońca", "Tylko nocą"], k: 1, cat: "Zasady", e: "Łowiectwo podwodne (osobna karta) tylko w porze dziennej: po upływie godziny od wschodu, nie później niż godzinę przed zachodem słońca." },
  { q: "Czy połów wędką w nocy jest dozwolony?", o: ["Nigdy", "Tak, o ile zezwolenie na dane łowisko nie stanowi inaczej", "Tylko latem"], k: 1, cat: "Zasady", e: "Nocne wędkowanie jest co do zasady dozwolone — ograniczenia mogą wynikać z zezwolenia na konkretną wodę." },
  { q: "Jaki przyrząd wędkarz ma obowiązek posiadać?", o: ["Wagę do ważenia ryb", "Przyrząd do wyjmowania haczyków", "Echosondę"], k: 1, cat: "Zasady", e: "Obowiązkowy jest przyrząd do wyjmowania haczyka z pyska ryby (wypychacz, kleszcze), by nie okaleczać ryb." },
  { q: "Jak przechowuje się złowione ryby żywe?", o: ["W wiadrze z wodą", "W siatce z miękkiej tkaniny rozpiętej na obręczach; każdy łowiący ma własną siatkę", "We wspólnej siatce dla całej grupy"], k: 1, cat: "Zasady", e: "Ryby przechowujemy w siatkach z miękkich nici, rozpiętych na obręczach — każdy wędkarz w swojej." },
  { q: "Co zrobić ze złowionym rakiem pręgowatym, sygnałowym lub rybą inwazyjną (np. trawianka, czebaczek, sumik karłowaty)?", o: ["Wypuścić z powrotem", "Niezwłocznie uśmiercić — nie wolno wpuszczać ich ani do łowiska, ani do innych wód", "Przenieść do innego zbiornika"], k: 1, cat: "Etyka", e: "§8 rozporządzenia: złowione okazy gatunków nierodzimych/inwazyjnych należy niezwłocznie uśmiercić i nie można ich wpuszczać do żadnych wód." },
  { q: "Wymiar ochronny szczupaka wg rozporządzenia wynosi:", o: ["40 cm", "45 cm", "55 cm"], k: 1, cat: "Wymiary", e: "Ogólnopolski wymiar szczupaka to 45 cm (Dz.U. 2023 poz. 1373). Uwaga: wiele okręgów PZW podnosi go do 50 cm." },
  { q: "Wymiar ochronny sandacza wg rozporządzenia wynosi:", o: ["35 cm", "45 cm", "60 cm"], k: 1, cat: "Wymiary", e: "Sandacz: 45 cm wg rozporządzenia; okręgi PZW często stosują 50 cm." },
  { q: "Wymiar ochronny suma wynosi:", o: ["50 cm", "70 cm", "90 cm"], k: 1, cat: "Wymiary", e: "Sum europejski: 70 cm." },
  { q: "Wymiar ochronny węgorza wynosi:", o: ["45 cm", "50 cm", "60 cm"], k: 1, cat: "Wymiary", e: "Węgorz: 50 cm (§6 rozporządzenia). Dobowy limit 2 szt. jest zapisany wprost w §2 ust. 3 rozporządzenia. Okres ochronny: 1 XII – 31 III." },
  { q: "Wymiar ochronny lina wynosi:", o: ["20 cm", "25 cm", "30 cm"], k: 1, cat: "Wymiary", e: "Lin: 25 cm. Limit dobowy: 4 sztuki." },
  { q: "Wymiar ochronny bolenia wynosi:", o: ["30 cm", "40 cm", "50 cm"], k: 1, cat: "Wymiary", e: "Boleń: 40 cm. Wchodzi też do wspólnego limitu 2 szt. ze szczupakiem i sandaczem." },
  { q: "Wymiar ochronny brzany wynosi:", o: ["30 cm", "40 cm", "50 cm"], k: 1, cat: "Wymiary", e: "Brzana: 40 cm, okres ochronny 1 I – 30 VI." },
  { q: "Podaj wymiar ochronny wzdręgi:", o: ["Poniżej 15 cm", "Poniżej 20 cm", "Brak wymiaru ochronnego"], k: 0, cat: "Wymiary", e: "Wzdręga ma wymiar ochronny 15 cm — to pytanie pojawia się w poznańskich zestawach egzaminacyjnych." },
  { q: "Wymiar ochronny lipienia wynosi:", o: ["25 cm", "30 cm", "35 cm"], k: 1, cat: "Wymiary", e: "Lipień: 30 cm, okres ochronny 1 III – 31 V." },
  { q: "Wymiar ochronny pstrąga potokowego wynosi:", o: ["25 cm", "30 cm", "40 cm"], k: 1, cat: "Wymiary", e: "Pstrąg potokowy: 30 cm, okres ochronny 1 IX – 31 XII." },
  { q: "Wymiar ochronny certy wynosi:", o: ["25 cm", "30 cm", "35 cm"], k: 1, cat: "Wymiary", e: "Certa: 30 cm, okres ochronny 1 I – 30 VI." },
  { q: "Wymiar ochronny świnki wynosi:", o: ["20 cm", "25 cm", "30 cm"], k: 1, cat: "Wymiary", e: "Świnka: 25 cm, okres ochronny 1 I – 15 V." },
  { q: "Czy okoń ma ogólnopolski wymiar ochronny?", o: ["Tak, 20 cm", "Nie — ale okręgi mogą wprowadzić własny (np. 15–18 cm)", "Tak, 25 cm"], k: 1, cat: "Wymiary", e: "Rozporządzenie nie określa wymiaru okonia; lokalne regulaminy często go wprowadzają — sprawdzaj zezwolenie." },
  { q: "Okres ochronny szczupaka to:", o: ["1 grudnia – 30 kwietnia", "1 marca – 31 maja", "1 stycznia – 30 kwietnia"], k: 2, cat: "Okresy", e: "Szczupak: 1 I – 30 IV. Zbiega się z zakazem łowienia na żywca i trupka." },
  { q: "Okres ochronny sandacza to:", o: ["1 marca – 31 maja", "1 stycznia – 30 kwietnia", "Brak okresu"], k: 0, cat: "Okresy", e: "Sandacz: 1 III – 31 V (§7 rozporządzenia). Szczupak jest chroniony wcześniej (1 I – 30 IV), sandacz później — trze się przy cieplejszej wodzie." },
  { q: "Okres ochronny suma to:", o: ["1 stycznia – 31 maja", "1 listopada – 30 czerwca", "1 maja – 31 lipca"], k: 0, cat: "Okresy", e: "Sum: 1 I – 31 V (§7 rozporządzenia z 12.07.2023 r.). Uwaga: stare materiały podają 1 XI – 30 VI z poprzedniego rozporządzenia — to już nieaktualne." },
  { q: "Okres ochronny węgorza to:", o: ["1 grudnia – 31 marca", "1 stycznia – 30 kwietnia", "Brak okresu"], k: 0, cat: "Okresy", e: "Węgorz: 1 XII – 31 III." },
  { q: "Czy boleń ma okres ochronny?", o: ["Tak, 1 stycznia – 30 kwietnia", "Nie — rozporządzenie z 2023 r. nie przewiduje okresu ochronnego bolenia", "Tak, 1 marca – 31 maja"], k: 1, cat: "Okresy", e: "W §7 rozporządzenia z 12.07.2023 r. boleń nie występuje — ma tylko wymiar ochronny (40 cm) i wspólny limit dobowy ze szczupakiem i sandaczem. Starsze materiały podają 1 I – 30 IV z poprzednich przepisów." },
  { q: "Okres ochronny brzany to:", o: ["1 stycznia – 30 czerwca", "1 września – 31 grudnia", "Brak okresu"], k: 0, cat: "Okresy", e: "Brzana: 1 I – 30 VI. Taki sam okres ma certa." },
  { q: "Okres ochronny świnki to:", o: ["1 stycznia – 15 maja", "1 czerwca – 31 sierpnia", "Brak okresu"], k: 0, cat: "Okresy", e: "Świnka: 1 I – 15 V." },
  { q: "Okres ochronny lipienia to:", o: ["1 marca – 31 maja", "1 września – 31 grudnia", "1 stycznia – 30 kwietnia"], k: 0, cat: "Okresy", e: "Lipień: 1 III – 31 V. Uwaga: pstrąg potokowy odwrotnie — chroniony jesienią i zimą (1 IX – 31 XII)." },
  { q: "Okres ochronny pstrąga potokowego to:", o: ["1 marca – 31 maja", "1 września – 31 grudnia", "1 stycznia – 30 kwietnia"], k: 1, cat: "Okresy", e: "Pstrąg potokowy trze się jesienią, stąd ochrona 1 IX – 31 XII." },
  { q: "Okres ochronny miętusa to:", o: ["1 grudnia – koniec lutego", "1 marca – 31 maja", "1 czerwca – 31 sierpnia"], k: 0, cat: "Okresy", e: "Miętus (jedyny słodkowodny dorszowaty) trze się zimą: ochrona 1 XII – koniec lutego." },
  { q: "Pierwszy dzień okresu ochronnego wypada w święto. Co wtedy?", o: ["Okres wydłuża się o jeden dzień", "Okres ulega skróceniu o ten dzień", "Nic się nie zmienia"], k: 1, cat: "Okresy", e: "Jeżeli pierwszy lub ostatni dzień okresu ochronnego przypada w dzień ustawowo wolny od pracy, okres skraca się o ten dzień." },
  { q: "Dobowy limit połowu suma wynosi:", o: ["1 sztuka", "2 sztuki", "3 sztuki"], k: 0, cat: "Limity", e: "Sum: 1 sztuka na dobę (doba liczona 0:00–24:00)." },
  { q: "Ile łącznie sztuk szczupaka, sandacza i bolenia można zabrać w ciągu doby?", o: ["Po 2 sztuki każdego gatunku", "Łącznie 2 sztuki wszystkich tych gatunków", "Łącznie 5 sztuk"], k: 1, cat: "Limity", e: "W Okręgu PZW Poznań wspólny limit 2 szt. na dobę obejmuje ŁĄCZNIE: szczupaka, sandacza, bolenia, sieję, troć jeziorową, troć wędrowną i łososia." },
  { q: "Dobowy limit połowu węgorza wynosi:", o: ["1 sztuka", "2 sztuki", "4 sztuki"], k: 1, cat: "Limity", e: "Węgorz: 2 sztuki na dobę." },
  { q: "Dobowy limit lina na wodach Okręgu PZW w Poznaniu wynosi:", o: ["2 sztuki", "4 sztuki", "Bez limitu"], k: 0, cat: "Limity", e: "RAPR PZW Poznań: karp i lin — po 2 sztuki na dobę. W innych okręgach bywa inaczej (ogólny RAPR: lin 4 szt.), dlatego zawsze czytaj zezwolenie." },
  { q: "Łączny limit lipienia i pstrąga potokowego wynosi:", o: ["Łącznie 3 sztuki", "Po 3 sztuki każdego", "Łącznie 5 sztuk"], k: 0, cat: "Limity", e: "Lipień i pstrąg potokowy: łącznie 3 sztuki na dobę (RAPR PZW Poznań)." },
  { q: "Ile ryb pozostałych gatunków (bez limitów sztukowych) można zabrać w ciągu doby?", o: ["Do 3 kg", "Do 5 kg", "Bez ograniczeń"], k: 1, cat: "Limity", e: "Ryby gatunków bez limitu sztukowego: łącznie do 5 kg na dobę." },
  { q: "Na wodach Okręgu PZW w Poznaniu szczupak i sandacz mają wymiar ochronny:", o: ["Tylko dolny: do 50 cm", "Widełkowy: do 50 cm ORAZ od 80 cm (dużych też się nie zabiera)", "Tylko górny: od 80 cm"], k: 1, cat: "Wymiary", e: "Od 2025 r. RAPR PZW Poznań wprowadza wymiar widełkowy: chronione są ryby do 50 cm i od 80 cm. Duże tarlaki wracają do wody." },
  { q: "Jak długo można przechowywać złowione ryby w siatce (RAPR PZW Poznań)?", o: ["Do 12 godzin", "Nie dłużej niż 24 godziny", "Bez ograniczeń"], k: 1, cat: "Zasady", e: "RAPR PZW Poznań zabrania przechowywania ryb w siatce dłużej niż 24 godziny i w ilości większej niż limit dobowy." },
  { q: "Sztuczna przynęta (np. wobler) może mieć maksymalnie:", o: ["2 haczyki po 2 ostrza", "3 haczyki, każdy z maks. 4 ostrzami", "5 haczyków bez ograniczeń ostrzy"], k: 1, cat: "Zasady", e: "§2 rozporządzenia: sztuczna przynęta — nie więcej niż 3 haczyki, każdy z maks. 4 ostrzami w obwodzie koła o średnicy 30 mm. Przynęta naturalna: 1 haczyk; mucha: maks. 2 haczyki po 2 ostrza." },
  { q: "Minimalna długość wędziska wynosi:", o: ["30 cm", "50 cm", "1 m"], k: 0, cat: "Zasady", e: "§2 rozporządzenia: wędkuje się wędziskiem o długości co najmniej 30 cm z linką." },
  { q: "Czy wolno używać sztucznego światła do lokalizowania i wabienia ryb?", o: ["Tak, nocą", "Nie — jest to zabronione", "Tak, tylko zimą"], k: 1, cat: "Zasady", e: "§2 rozporządzenia: amatorski połów ryb uprawia się bez stosowania sztucznego światła do lokalizacji i wabienia ryb. Oświetlenie stanowiska (lampka) jest oczywiście dozwolone." },
  { q: "Jakie warunki musi spełniać podrywka do łowienia ryb na przynętę?", o: ["Siatka maks. 1 m × 1 m, oczka min. 5 mm", "Siatka maks. 2 m × 2 m, dowolne oczka", "Podrywki są zakazane"], k: 0, cat: "Zasady", e: "§2 ust. 5 rozporządzenia: powierzchnia siatki podrywki maks. 1 m × 1 m, oczka nie mniejsze niż 5 mm." },
  { q: "Czy młodzież w wieku 14–16 lat może wędkować nocą samodzielnie (RAPR PZW Poznań)?", o: ["Tak, bez ograniczeń", "Nie — w porze nocnej wymagany jest nadzór osoby uprawnionej do opieki", "Tylko latem"], k: 1, cat: "Prawo", e: "RAPR PZW Poznań: prawo do samodzielnego wędkowania ma osoba od 14 lat, ale do 16 lat nie wolno wędkować nocą bez nadzoru opiekuna." },
  { q: "Kto oprócz dzieci do lat 14 jest zwolniony z obowiązku posiadania karty wędkarskiej?", o: ["Emeryci", "Cudzoziemcy czasowo przebywający w Polsce", "Studenci"], k: 1, cat: "Prawo", e: "Ustawa o rybactwie śródlądowym zwalnia z obowiązku posiadania karty osoby do 14 lat oraz cudzoziemców czasowo przebywających w Polsce (nadal potrzebują zezwolenia!)." },
  { q: "Okres ochronny węgorza a dzień ustawowo wolny od pracy (RAPR PZW Poznań):", o: ["Skraca się jak dla innych gatunków", "Okres ochronny węgorza NIE ulega skróceniu", "Węgorz nie ma okresu ochronnego"], k: 1, cat: "Okresy", e: "Zasada skracania okresu o dzień wolny obowiązuje dla ryb — z wyjątkiem węgorza (RAPR PZW Poznań). Okres węgorza: 1 XII – 31 III." },
  { q: "Ile wynosi opłata za wydanie karty wędkarskiej?", o: ["10 zł", "30 zł", "70 zł"], k: 0, cat: "Prawo", e: "§5 rozporządzenia: opłata za wydanie karty wędkarskiej to 10 zł. Osobno płaci się za egzamin (w Okręgu Poznańskim 70 zł)." },
  { q: "W jakiej odległości od rozstawionych w wodzie sieci rybackich (narzędzi uprawnionego do rybactwa) zabroniony jest połów wędką?", o: ["25 m", "50 m", "100 m"], k: 1, cat: "Zasady", e: "Art. 8 ustawy: zakaz połowu wędką bliżej niż 50 m od rozstawionych narzędzi połowowych uprawnionego do rybactwa i oznakowanych krześlisk." },
  { q: "W jakiej odległości od znaku oznaczającego podwodny połów ryb kuszą nie wolno łowić wędką?", o: ["50 m", "75 m", "100 m"], k: 1, cat: "Zasady", e: "Art. 8 ustawy: zakaz połowu wędką w odległości mniejszej niż 75 m od znaku oznaczającego dokonywanie podwodnego połowu ryb kuszą." },
  { q: "Iloma wędkami maksymalnie wolno łowić ryby łososiowate i lipienie?", o: ["Jedną", "Dwiema", "Trzema"], k: 0, cat: "Zasady", e: "Art. 8 ustawy: wolno łowić maks. dwiema wędkami jednocześnie, ale w przypadku ryb łososiowatych i lipieni — tylko jedną wędką." },
  { q: "Czy dozwolone jest łowienie tzw. szarpakiem (ciągłe podnoszenie i opuszczanie przynęty)?", o: ["Tak, zawsze", "Nie — z wyjątkiem połowu ryb pod lodem", "Tylko na rzekach"], k: 1, cat: "Zasady", e: "Art. 8 ustawy zabrania połowu wędką przez podnoszenie i opuszczanie przynęty w sposób ciągły, z wyjątkiem łowienia ryb pod lodem (np. mormyszką)." },
  { q: "Co grozi za amatorski połów ryb bez karty wędkarskiej lub zezwolenia?", o: ["Tylko pouczenie", "Grzywna, a sąd może orzec też m.in. przepadek sprzętu i cofnięcie karty", "Kara pozbawienia wolności do 5 lat"], k: 1, cat: "Prawo", e: "Art. 27–27b ustawy: to wykroczenie zagrożone grzywną (przy części naruszeń nie niższą niż 200 zł); sąd może dodatkowo orzec przepadek sprzętu wędkarskiego i cofnięcie karty wędkarskiej." },
  { q: "Co robi się z żywą rybą złowioną w okresie ochronnym lub poniżej wymiaru (art. 9 ustawy)?", o: ["Można ją przenieść do innego łowiska", "Niezwłocznie wypuszcza się ją do tego samego łowiska z niezbędną starannością", "Przekazuje się ją straży rybackiej"], k: 1, cat: "Zasady", e: "Art. 9 ustawy: ryby złowione z naruszeniem art. 8 (okres, wymiar, ochrona gatunkowa), jeżeli są żywe, niezwłocznie wypuszcza się do TEGO SAMEGO łowiska z zachowaniem niezbędnej staranności." },
  { q: "Które gatunki ryb są OBCE (introdukowane) w polskiej ichtiofaunie?", o: ["peluga, amur, tołpyga, pstrąg tęczowy, sumik karłowaty", "kiełb Kesslera, śliz, jelec, świnka", "stynka, miętus, węgorz"], k: 0, cat: "Biologia", e: "Amur, tołpyga, pstrąg tęczowy, sumik karłowaty i peluga to gatunki obce, sprowadzone do Polski. Śliz, jelec, świnka, stynka, miętus i węgorz są rodzime. To pytanie pojawia się na teście PZW." },
  { q: "Po czym najłatwiej odróżnić karpia od karasia?", o: ["Po liczbie płetw", "Karp ma 2 pary wąsików, karaś nie ma wąsików", "Karaś jest zawsze większy"], k: 1, cat: "Biologia", e: "Karp ma dwie pary wąsików (czułków) przy pysku. Karaś nie ma żadnych — to najpewniejsza cecha." },
  { q: "Ile płetw grzbietowych ma sandacz?", o: ["Jedną", "Dwie — pierwszą kolczastą", "Trzy"], k: 1, cat: "Biologia", e: "Sandacz należy do okoniowatych i ma dwie płetwy grzbietowe (pierwsza twarda, kolczasta). Szczupak ma tylko jedną, mocno cofniętą." },
  { q: "Co odróżnia pstrąga tęczowego (obcego) od potokowego (rodzimego)?", o: ["Tęczowy ma różowo-tęczową wstęgę wzdłuż boku i cętki na ogonie", "Potokowy jest zawsze większy", "Tęczowy nie ma płetwy tłuszczowej"], k: 0, cat: "Biologia", e: "Pstrąg tęczowy ma charakterystyczną tęczową wstęgę wzdłuż linii bocznej oraz ciemne cętki na płetwie ogonowej. Potokowy ma czerwone kropki z jasną obwódką." },
  { q: "Po jakiej charakterystycznej płetwie rozpoznasz ryby łososiowate?", o: ["Po długiej płetwie odbytowej", "Po płetwie tłuszczowej między grzbietową a ogonową", "Po podwójnej płetwie ogonowej"], k: 1, cat: "Biologia", e: "Łososiowate (pstrągi, trocie, łosoś, lipień, głowacica) mają małą, miękką płetwę tłuszczową między płetwą grzbietową a ogonową." },
  { q: "Do czego służy wylęgowi ryb woreczek żółtkowy?", o: ["Zapobiega spłynięciu larw z prądem wody", "Stanowi źródło pokarmu", "Nie ma żadnego znaczenia"], k: 1, cat: "Biologia", e: "Woreczek żółtkowy to zapas substancji odżywczych — odżywia świeżo wyklutą larwę, zanim zacznie ona samodzielnie żerować." },
  { q: "Czy pęcherz pławny ułatwia rybom:", o: ["oddychanie", "trawienie", "utrzymywanie pozycji w wodzie"], k: 2, cat: "Biologia", e: "Pęcherz pławny to narząd hydrostatyczny — pozwala rybie utrzymać głębokość bez ciągłego pływania. Nie służy do oddychania ani trawienia." },
  { q: "Śluz pokrywający ciało ryby to:", o: ["gatunek ryby chronionej", "wydzielina pokrywająca ciało ryb", "rodzaj smaru do kołowrotków"], k: 1, cat: "Biologia", e: "Śluz to naturalna wydzielina chroniąca skórę ryby przed pasożytami i infekcjami oraz zmniejszająca tarcie. Nie mylić ze 'śliz' — to gatunek ryby." },
  { q: "U których ryb występuje płetwa tłuszczowa?", o: ["szczupakowate", "sumowate", "łososiowate"], k: 2, cat: "Biologia", e: "Płetwa tłuszczowa (mała, miękka, przy ogonie) to cecha ryb łososiowatych: pstrągów, troci, łososia, lipienia, głowacicy." },
  { q: "Które ryby budują gniazda tarłowe?", o: ["sandacz, łosoś", "okoń, jazgarz", "leszcz, krąp"], k: 0, cat: "Biologia", e: "Sandacz i łosoś budują gniazda tarłowe i pilnują ikry. Okoń składa ikrę w postaci wstęg, leszcz i krąp rozrzucają ją na roślinności." },

/* ==================== KOMPONENTY ==================== */

const C = {
  bg: "#E8EDE9", ink: "#16333A", card: "#FBFBF7", line: "#C9D3CC",
  red: "#C03A21", water: "#38707E", green: "#2F6B45", sand: "#E5DFC9",
};


/* Link do zdjęć gatunku — wyszukiwanie po nazwie łacińskiej trafia w artykuł z galerią */
const photoUrl = (lat) => "https://pl.wikipedia.org/w/index.php?search=" + encodeURIComponent(lat);

function PhotoLink({ lat, small }) {
  return (
    <a href={photoUrl(lat)} target="_blank" rel="noopener noreferrer" style={{
      display: "inline-block", padding: small ? "3px 10px" : "5px 12px", borderRadius: 999,
      fontSize: small ? 12 : 13, fontWeight: 600, textDecoration: "none",
      border: "1.5px solid " + C.water, color: C.water, background: "rgba(56,112,126,0.06)",
    }}>Zobacz zdjęcia ↗</a>
  );
}


/* Cache galerii zdjęć per gatunek (klucz: nazwa łacińska).
   Wartość: { list: [url,...] } albo { list: null } gdy nie udało się pobrać.
   Dzięki temu każdy gatunek pobieramy raz, a różne pytania biorą różne zdjęcia. */
const fishGallery = {};

/* Pobiera do kilku zdjęć gatunku z Wikimedia (media-list REST + summary jako pewny fallback).
   Wszystko z domen *.wikipedia.org, które wspierają CORS i wolne licencje. */
async function fetchGallery(fish) {
  const key = fish.lat;
  if (fishGallery[key]) return fishGallery[key].list;

  const badWords = /\.svg$|logo|icon|map|mapa|distribution|range|stamp|drawing|zeichnung|illustration|commons-logo|edit-|question|disambig/i;
  const urls = [];
  const pushU = (u) => { if (u && !badWords.test(u) && !urls.includes(u)) urls.push(u); };

  // 1) media-list z polskiej i angielskiej Wikipedii — zwraca WSZYSTKIE ilustracje artykułu
  const grabMedia = async (lang, title) => {
    try {
      const r = await fetch("https://" + lang + ".wikipedia.org/api/rest_v1/page/media-list/" + encodeURIComponent(title));
      if (!r.ok) return;
      const d = await r.json();
      (d.items || []).forEach((it) => {
        if (it.type !== "image") return;
        const src = it.srcset && it.srcset.length ? it.srcset[it.srcset.length - 1].src : it.src;
        if (src) pushU(src.startsWith("//") ? "https:" + src : src);
      });
    } catch (e) { /* ignore */ }
  };
  // 2) summary — pewne, główne zdjęcie (to samo co działało dotąd)
  const grabSummary = async (lang, title) => {
    try {
      const r = await fetch("https://" + lang + ".wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(title));
      if (!r.ok) return;
      const d = await r.json();
      if (d.type === "disambiguation") return;
      pushU((d.originalimage && d.originalimage.source) || (d.thumbnail && d.thumbnail.source));
    } catch (e) { /* ignore */ }
  };

  await grabMedia("pl", fish.lat);
  if (urls.length < 4) await grabMedia("en", fish.lat);
  if (urls.length < 2) await grabMedia("pl", fish.n);
  await grabSummary("pl", fish.lat);
  if (!urls.length) await grabSummary("en", fish.lat);

  const list = urls.length ? urls.slice(0, 8) : null;
  fishGallery[key] = { list };
  return list;
}

/* Zdjęcie gatunku pobierane z Wikipedii (REST API, CORS). Fallback: grafika SVG.
   prop `variant` (liczba) wybiera, KTÓRE zdjęcie z galerii pokazać — dzięki temu
   ten sam gatunek w różnych pytaniach dostaje różne zdjęcia. Brak variant = główne. */
function FishPhoto({ fish, height, rounded, fit, variant }) {
  const [list, setList] = useState(null);
  const [tried, setTried] = useState(false);
  const [skip, setSkip] = useState(0);   // ile kolejnych URL-i pominąć po błędzie ładowania
  useEffect(() => {
    let alive = true;
    setSkip(0);
    (async () => {
      const g = await fetchGallery(fish);
      if (!alive) return;
      setList(g); setTried(true);
    })();
    return () => { alive = false; };
  }, [fish.lat]);
  const h = height || 170;

  let src = null;
  if (list && list.length) {
    const base = (typeof variant === "number" ? variant : 0);
    const i = (base + skip) % list.length;
    if (skip < list.length) src = list[i];
  }
  if (src) {
    return <img src={src} alt={"Zdjęcie: " + fish.n} loading="lazy"
      style={{ width: "100%", height: h, objectFit: fit || "contain", borderRadius: rounded ? 8 : 0, display: "block", background: C.bg }}
      onError={() => setSkip((s) => s + 1)} />;
  }
  return (
    <div style={{ position: "relative", background: C.bg, borderRadius: rounded ? 8 : 0 }}>
      <svg viewBox="0 0 220 90" style={{ width: "100%", display: "block" }} role="img" aria-label={"Sylwetka: " + fish.n}>
        <FishShape shape={fish.shape} c1={fish.c1} c2={fish.c2} />
      </svg>
      {!tried && <span style={{ position: "absolute", bottom: 4, right: 8, fontSize: 10, opacity: 0.5 }}>ładuję zdjęcie…</span>}
    </div>
  );
}

function Ruler({ wymiar }) {
  const max = 80;
  const ticks = [];
  for (let i = 0; i <= max; i += 5) ticks.push(i);
  return (
    <svg viewBox="0 0 220 26" style={{ width: "100%", display: "block" }} aria-hidden="true">
      <rect x="0" y="8" width="220" height="14" fill={C.sand} rx="2" />
      {ticks.map((t) => {
        const x = 6 + (t / max) * 208;
        const big = t % 10 === 0;
        return (
          <g key={t}>
            <line x1={x} y1="8" x2={x} y2={big ? 17 : 13} stroke={C.ink} strokeWidth="1" opacity="0.7" />
            {big && <text x={x} y="24" fontSize="6" textAnchor="middle" fill={C.ink} opacity="0.7" fontFamily="inherit">{t}</text>}
          </g>
        );
      })}
      {wymiar > 0 && (
        <g>
          <line x1={6 + (wymiar / max) * 208} y1="0" x2={6 + (wymiar / max) * 208} y2="22" stroke={C.red} strokeWidth="2.5" />
          <circle cx={6 + (wymiar / max) * 208} cy="3" r="3" fill={C.red} />
        </g>
      )}
    </svg>
  );
}

function Pill({ children, tone }) {
  const colors = { red: C.red, water: C.water, green: C.green, ink: C.ink };
  const col = colors[tone] || C.ink;
  return (
    <span style={{
      display: "inline-block", padding: "3px 10px", borderRadius: 999, fontSize: 12.5,
      border: "1.5px solid " + col, color: col, fontWeight: 600, letterSpacing: "0.01em",
    }}>{children}</span>
  );
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Pytania obrazkowe generowane z atlasu: wymiar + okres dla każdego gatunku */
function buildFishQuestions() {
  const okresLabel = (o) => (o === "brak" ? "Brak okresu ochronnego" : o);
  const allWymiary = [...new Set(FISHES.filter((f) => f.wymiar > 0).map((f) => f.wymiar))];
  const allOkresy = [...new Set(FISHES.map((f) => okresLabel(f.okres)))];
  const pickWrong = (pool, correct, n) => shuffle(pool.filter((v) => v !== correct)).slice(0, n);
  const qs = [];
  FISHES.forEach((f) => {
    if (f.wymiar > 0) {
      const wrong = pickWrong(allWymiary, f.wymiar, 2);
      const opts = shuffle([f.wymiar, ...wrong]).map((v) => v + " cm");
      qs.push({
        q: "Jaki jest wymiar ochronny tej ryby?", fish: f,
        o: opts, k: opts.indexOf(f.wymiar + " cm"), cat: "Wymiary · " + f.n,
        e: f.n + ": wymiar ochronny " + f.wymiar + " cm." + (f.wymiarNote ? " Uwaga: " + f.wymiarNote + "." : ""),
      });
    }
    const cOk = okresLabel(f.okres);
    const wrongOk = pickWrong(allOkresy, cOk, 2);
    const optsOk = shuffle([cOk, ...wrongOk]);
    qs.push({
      q: "Jaki okres ochronny ma ta ryba?", fish: f,
      o: optsOk, k: optsOk.indexOf(cOk), cat: "Okresy · " + f.n,
      e: f.n + ": " + (f.okres === "brak" ? "brak okresu ochronnego." : "okres ochronny " + f.okres + ".") + (f.okresNote ? " " + f.okresNote + "." : ""),
    });
  });
  return shuffle(qs);
}


/* Pytania rozpoznawania gatunków ze zdjęć — dwa warianty pomieszane:
   A) pokazane zdjęcie → wybierz nazwę gatunku
   B) podany gatunek → wybierz właściwe zdjęcie (z 4 zdjęć) */
function buildRecognitionQuestions() {
  const pickOthers = (correct, n) => shuffle(FISHES.filter((x) => x.n !== correct.n)).slice(0, n);
  const qs = [];
  FISHES.forEach((f, fi) => {
    // Wariant A: zdjęcie → nazwa
    const distractA = pickOthers(f, 3);
    const optsA = shuffle([f, ...distractA]);
    qs.push({
      recog: true, fish: f, hideName: true, photoVariant: fi,
      q: "Co to za ryba?",
      o: optsA.map((x) => x.n), k: optsA.findIndex((x) => x.n === f.n),
      cat: "Rozpoznawanie",
      e: f.n + " (" + f.lat + ").",
    });
    // Wariant B: nazwa → zdjęcie (każde zdjęcie-opcja z innym wariantem, by nie dublować kadru)
    const distractB = pickOthers(f, 3);
    const optsB = shuffle([f, ...distractB]);
    qs.push({
      recog: true, photoOptions: optsB, hideName: true, photoVariant: fi + 1,
      q: "Które zdjęcie przedstawia gatunek: " + f.n + "?",
      k: optsB.findIndex((x) => x.n === f.n),
      correctName: f.n, correctLat: f.lat,
      cat: "Rozpoznawanie",
      e: "Poprawne zdjęcie to " + f.n + " (" + f.lat + ").",
    });
  });
  return shuffle(qs);
}

/* ---------- Zakładka: Test ---------- */
function Quiz() {
  const [mode, setMode] = useState(null);        // "nauka" | "egzamin"
  const [qs, setQs] = useState([]);
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);    // wybrana odpowiedź (single)
  const [sel, setSel] = useState([]);            // zaznaczenia (multi)
  const [answers, setAnswers] = useState([]);    // historia { qi, picked, ok }
  const [done, setDone] = useState(false);

  const start = (m) => {
    let pool;
    if (m === "ryby") pool = buildFishQuestions();
    else if (m === "rozpoznawanie") pool = buildRecognitionQuestions();
    else if (m === "multi") pool = shuffle(MULTI_QUESTIONS.map((q) => ({ ...q, multi: true })));
    else if (m === "egzamin") {
      const singles = shuffle(QUESTIONS).slice(0, 16);
      const multis = shuffle(MULTI_QUESTIONS.map((q) => ({ ...q, multi: true }))).slice(0, 4);
      pool = shuffle([...singles, ...multis]);
    } else pool = shuffle(QUESTIONS);
    setMode(m); setQs(pool); setIdx(0); setPicked(null); setSel([]); setAnswers([]); setDone(false);
  };
  const reset = () => { setMode(null); setDone(false); };

  if (!mode) {
    return (
      <div style={{ display: "grid", gap: 12, maxWidth: 560 }}>
        <p style={{ margin: 0, fontSize: 15.5, lineHeight: 1.65, opacity: 0.85 }}>
          Wybierz tryb. W trybie nauki, obrazkowym i rozpoznawania po każdej odpowiedzi zobaczysz wyjaśnienie.
          Tryb rozpoznawania pokazuje zdjęcia ryb: raz pytamy „co to za ryba", raz „które zdjęcie to dany gatunek".
          Tryb obrazkowy przepyta Cię z wymiarów i okresów ochronnych wszystkich 25 gatunków z atlasu.
          W trybie wielokrotnego wyboru zaznaczasz WSZYSTKIE pasujące odpowiedzi — punkt liczy się tylko za komplet.
          Egzamin próbny odwzorowuje warunki poznańskie: 20 pytań (w tym wielokrotnego wyboru), wynik na końcu, próg 80%.
        </p>
        <button onClick={() => start("nauka")} style={btnBig(C.water)}>Tryb nauki — wszystkie pytania z wyjaśnieniami</button>
        <button onClick={() => start("rozpoznawanie")} style={btnBig(C.green)}>Rozpoznawanie gatunków ze zdjęć — co to za ryba?</button>
        <button onClick={() => start("ryby")} style={btnBig("#3E6B57")}>Wymiary i okresy z obrazkami ryb — rozpoznajesz i odpowiadasz</button>
        <button onClick={() => start("multi")} style={btnBig("#7A5C2E")}>Wielokrotny wybór — zaznacz wszystkie pasujące gatunki</button>
        <button onClick={() => start("egzamin")} style={btnBig(C.red)}>Egzamin próbny — 20 pytań, próg 80%</button>
      </div>
    );
  }

  if (done) {
    const ok = answers.filter((a) => a.ok).length;
    const pct = Math.round((ok / qs.length) * 100);
    const passed = pct >= 80;
    const wrong = answers.filter((a) => !a.ok);
    return (
      <div style={{ maxWidth: 640 }}>
        <div style={{
          background: C.card, border: "2px solid " + (passed ? C.green : C.red), borderRadius: 14,
          padding: "22px 20px", textAlign: "center", marginBottom: 16,
        }}>
          <div style={{ fontFamily: "'Zilla Slab', serif", fontSize: 42, fontWeight: 700, color: passed ? C.green : C.red }}>{pct}%</div>
          <div style={{ fontSize: 16, marginTop: 2 }}>{ok} / {qs.length} poprawnych odpowiedzi</div>
          <div style={{ fontFamily: "'Zilla Slab', serif", fontSize: 21, fontWeight: 600, marginTop: 8, color: passed ? C.green : C.red }}>
            {passed ? "Zdane! Ten wynik wystarczyłby na egzaminie." : "Poniżej progu 80% — jeszcze raz przez materiały i do boju."}
          </div>
        </div>
        {wrong.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <h3 style={{ fontFamily: "'Zilla Slab', serif", fontSize: 19, margin: "0 0 10px" }}>Do powtórki:</h3>
            {wrong.map((a, i) => {
              const q = qs[a.qi];
              return (
                <div key={i} style={{ background: C.card, border: "1.5px solid " + C.line, borderLeft: "4px solid " + C.red, borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
                  <p style={{ margin: "0 0 6px", fontWeight: 600, fontSize: 14.5 }}>{q.fish ? q.fish.n + " — " : ""}{q.q}</p>
                  {q.multi ? (
                    <>
                      <p style={{ margin: "0 0 4px", fontSize: 13.5 }}><span style={{ color: C.red }}>Zaznaczono:</span> {(a.sel || []).map((i) => q.o[i]).join(", ") || "nic"}</p>
                      <p style={{ margin: "0 0 4px", fontSize: 13.5 }}><span style={{ color: C.green }}>Poprawnie:</span> {q.correct.map((i) => q.o[i]).join(", ")}</p>
                    </>
                  ) : q.photoOptions ? (
                    <>
                      <p style={{ margin: "0 0 4px", fontSize: 13.5 }}><span style={{ color: C.red }}>Wybrano zdjęcie:</span> {a.picked != null && q.photoOptions[a.picked] ? q.photoOptions[a.picked].n : "—"}</p>
                      <p style={{ margin: "0 0 4px", fontSize: 13.5 }}><span style={{ color: C.green }}>Poprawne:</span> {q.correctName}</p>
                    </>
                  ) : (
                    <>
                      <p style={{ margin: "0 0 4px", fontSize: 13.5 }}><span style={{ color: C.red }}>Twoja odpowiedź:</span> {q.o[a.picked]}</p>
                      <p style={{ margin: "0 0 4px", fontSize: 13.5 }}><span style={{ color: C.green }}>Poprawna:</span> {q.o[q.k]}</p>
                    </>
                  )}
                  <p style={{ margin: 0, fontSize: 13.5, opacity: 0.75 }}>{q.e}</p>
                </div>
              );
            })}
          </div>
        )}
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <button onClick={() => start(mode)} style={btnBig(C.water)}>Jeszcze raz</button>
          <button onClick={reset} style={btnBig(C.ink)}>Zmień tryb</button>
        </div>
      </div>
    );
  }

  const q = qs[idx];
  const isMulti = !!q.multi;
  const answered = isMulti ? picked === "done" : picked !== null;
  const isLearn = mode === "nauka" || mode === "ryby" || mode === "rozpoznawanie" || mode === "multi";
  const arrEq = (a, b) => a.length === b.length && [...a].sort().every((v, i) => v === [...b].sort()[i]);
  const submit = (choice) => {
    if (answered) return;
    setPicked(choice);
    setAnswers([...answers, { qi: idx, picked: choice, ok: choice === q.k }]);
  };
  const toggleSel = (oi) => {
    if (answered) return;
    setSel(sel.includes(oi) ? sel.filter((x) => x !== oi) : [...sel, oi]);
  };
  const submitMulti = () => {
    if (answered) return;
    setPicked("done");
    setAnswers([...answers, { qi: idx, sel: [...sel], ok: arrEq(sel, q.correct) }]);
  };
  const goNext = () => {
    if (idx + 1 >= qs.length) { setDone(true); return; }
    setIdx(idx + 1); setPicked(null); setSel([]);
  };

  return (
    <div style={{ maxWidth: 640 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, fontSize: 13.5 }}>
        <span style={{ fontWeight: 600, color: C.water }}>{q.cat}</span>

      </div>
      <div style={{ height: 6, background: C.line, borderRadius: 999, marginBottom: 16 }}>
        <div style={{ height: "100%", width: ((idx + (answered ? 1 : 0)) / qs.length) * 100 + "%", background: C.water, borderRadius: 999, transition: "width .25s" }} />

      <div style={{ background: C.card, border: "1.5px solid " + C.line, borderRadius: 14, padding: "18px 18px 16px" }}>
        {q.fish && (
          <div style={{ background: C.bg, border: "1.5px solid " + C.line, borderRadius: 10, padding: "8px 12px 2px", marginBottom: 14 }}>
            <div style={{ maxWidth: 340, margin: "0 auto" }}><FishPhoto fish={q.fish} height={200} rounded variant={q.photoVariant} /></div>
            {(!q.hideName || answered) ? (
              <>
                <p style={{ margin: "2px 0 6px", textAlign: "center", fontFamily: "'Zilla Slab', serif", fontSize: 17, fontWeight: 700 }}>
                  {q.fish.n} <span style={{ fontWeight: 400, fontStyle: "italic", fontSize: 13, opacity: 0.6 }}>({q.fish.lat})</span>
                </p>
                <div style={{ textAlign: "center", marginBottom: 10 }}><PhotoLink lat={q.fish.lat} small /></div>
              </>
            ) : <div style={{ height: 8 }} />}
          </div>
        )}
        <p style={{ margin: "0 0 14px", fontFamily: "'Zilla Slab', serif", fontSize: 20, fontWeight: 600, lineHeight: 1.4 }}>{q.q}</p>
        {isMulti && <p style={{ margin: "-8px 0 12px", fontSize: 13, color: C.water, fontWeight: 600 }}>Zaznacz wszystkie pasujące odpowiedzi, potem naciśnij „Sprawdź".</p>}
        {q.photoOptions ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {q.photoOptions.map((opt, oi) => {
              let border = C.line;
              if (answered) {
                if (oi === q.k) border = C.green;
                else if (oi === picked) border = C.red;
              } else if (oi === picked) border = C.water;
              return (
                <button key={oi} onClick={() => submit(oi)} disabled={answered} style={{
                  padding: 6, borderRadius: 12, border: "2.5px solid " + border, background: C.bg,
                  cursor: answered ? "default" : "pointer", position: "relative",
                }}>
                  <FishPhoto fish={opt} height={130} rounded fit="contain" variant={(q.photoVariant || 0) + oi} />

                  {answered && <p style={{ margin: "4px 0 2px", textAlign: "center", fontSize: 13, fontWeight: 700, color: oi === q.k ? C.green : (oi === picked ? C.red : C.ink) }}>{opt.n}</p>}
                </button>
              );

          </div>
        ) : (
        <div style={{ display: "grid", gap: 8 }}>
          {q.o.map((opt, oi) => {
            let border = C.line, bg = "transparent";
            if (isMulti) {
              const chosen = sel.includes(oi);
              if (answered) {
                const shouldBe = q.correct.includes(oi);
                if (shouldBe) { border = C.green; bg = "rgba(47,107,69,0.10)"; }
                else if (chosen) { border = C.red; bg = "rgba(192,58,33,0.08)"; }
              } else if (chosen) { border = C.water; bg = "rgba(56,112,126,0.08)"; }
              return (
                <button key={oi} onClick={() => toggleSel(oi)} disabled={answered} style={{
                  textAlign: "left", padding: "12px 14px", borderRadius: 10, fontSize: 15, lineHeight: 1.45,
                  border: "1.5px solid " + border, background: bg, cursor: answered ? "default" : "pointer",
                  fontFamily: "inherit", color: C.ink, display: "flex", alignItems: "center", gap: 10,
                }}>
                  <span style={{
                    width: 20, height: 20, borderRadius: 5, flexShrink: 0, border: "2px solid " + (chosen || (answered && q.correct.includes(oi)) ? C.water : C.line),
                    background: chosen ? C.water : "transparent", color: "#fff", fontWeight: 700, fontSize: 13,
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{chosen ? "✓" : ""}</span>
                  <span>{opt}{answered && q.correct.includes(oi) && <span style={{ color: C.green, fontWeight: 700 }}> ✓</span>}</span>
                </button>
              );
            }
            if (answered) {
              if (oi === q.k) { border = C.green; bg = "rgba(47,107,69,0.08)"; }
              else if (oi === picked) { border = C.red; bg = "rgba(192,58,33,0.07)"; }
            }
            return (
              <button key={oi} onClick={() => submit(oi)} disabled={answered} style={{
                textAlign: "left", padding: "12px 14px", borderRadius: 10, fontSize: 15, lineHeight: 1.45,
                border: "1.5px solid " + border, background: bg, cursor: answered ? "default" : "pointer",
                fontFamily: "inherit", color: C.ink, transition: "border-color .15s",
              }}>
                <span style={{ fontWeight: 700, marginRight: 8, color: C.water }}>{"abcdef"[oi]})</span>{opt}
              </button>
            );
          })}
        </div>
        )}
        {isMulti && !answered && (
          <button onClick={submitMulti} disabled={sel.length === 0} style={{
            ...btnBig(sel.length === 0 ? C.line : C.water), marginTop: 12, width: "100%",
            cursor: sel.length === 0 ? "default" : "pointer",
          }}>Sprawdź</button>
        )}
        {answered && isLearn && (
          <p style={{ margin: "14px 0 0", padding: "12px 14px", background: C.sand, borderRadius: 10, fontSize: 14, lineHeight: 1.55 }}>
            {(isMulti ? arrEq(sel, q.correct) : picked === q.k) ? "Dobrze! " : "Niestety nie. "}{q.e}
          </p>
        )}
        {answered && (
          <button onClick={goNext} style={{ ...btnBig(C.ink), marginTop: 14, width: "100%" }}>
            {idx + 1 >= qs.length ? "Zobacz wynik" : "Następne pytanie"}
          </button>
        )}
      </div>
      {mode === "egzamin" && <p style={{ fontSize: 12.5, opacity: 0.6, marginTop: 10 }}>Tryb egzaminu: wyjaśnienia zobaczysz na końcu, przy pytaniach z błędami.</p>}
    </div>
  );
}

function btnBig(color) {
  return {
    padding: "13px 18px", borderRadius: 10, border: "none", background: color, color: "#fff",
    fontSize: 15.5, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.01em",
  };
}

            <div>

        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex" }}>
          {tabs.map((t) => (
